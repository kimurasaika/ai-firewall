# Staging — mirrors production topology; uses .env.staging
# Usage: docker compose -f docker-compose.staging.yml up

x-common-env: &common-env
  ENVIRONMENT: staging
  SECRET_MANAGER: env
  LOG_LEVEL: INFO
  MTLS_CA_CERT: /app/certs/ca.crt
  MTLS_CERT_DIR: /app/certs/mtls

services:

  haproxy:
    image: haproxy:2.8-alpine
    volumes:
      - ./config/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    ports:
      - "8080:8080"
      - "8404:8404"   # stats
    depends_on:
      - proxy_1
      - proxy_2
    restart: unless-stopped

  proxy_1:
    build:
      context: .
      dockerfile: dockerfiles/proxy.Dockerfile
    env_file: .env.staging
    environment:
      <<: *common-env
      INSTANCE_ID: proxy_1
    volumes:
      - ./certs:/app/certs:ro
      - ./config:/app/config:ro
    restart: unless-stopped

  proxy_2:
    build:
      context: .
      dockerfile: dockerfiles/proxy.Dockerfile
    env_file: .env.staging
    environment:
      <<: *common-env
      INSTANCE_ID: proxy_2
    volumes:
      - ./certs:/app/certs:ro
      - ./config:/app/config:ro
    restart: unless-stopped

  orchestrator:
    build:
      context: .
      dockerfile: dockerfiles/orchestrator.Dockerfile
    env_file: .env.staging
    environment:
      <<: *common-env
      ORCHESTRATOR_WORKERS: "4"
    volumes:
      - ./certs:/app/certs:ro
      - ./config:/app/config:ro
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2g

  redis:
    image: redis:7.2-alpine
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --bind 127.0.0.1
      --tls-port 6379
      --port 0
      --tls-cert-file /tls/redis.crt
      --tls-key-file /tls/redis.key
      --tls-ca-cert-file /tls/ca.crt
    network_mode: host
    volumes:
      - ./certs:/tls:ro
      - redis_data:/data
    restart: unless-stopped

  timescaledb:
    image: timescale/timescaledb:2.14.2-pg16
    env_file: .env.staging
    volumes:
      - tsdb_data:/var/lib/postgresql/data
    restart: unless-stopped

  domain_updater:
    build:
      context: .
      dockerfile: dockerfiles/domain_updater.Dockerfile
    env_file: .env.staging
    environment:
      <<: *common-env
    volumes:
      - ./certs:/app/certs:ro
      - ./config:/app/config

  dashboard_api:
    build:
      context: .
      dockerfile: dockerfiles/dashboard_api.Dockerfile
    env_file: .env.staging
    environment:
      <<: *common-env
    volumes:
      - ./certs:/app/certs:ro
      - ./config:/app/config:ro

  jaeger:
    image: jaegertracing/all-in-one:1.57
    ports:
      - "16686:16686"
      - "4317:4317"

  victoriametrics:
    image: victoriametrics/victoria-metrics:v1.99.0
    volumes:
      - vm_data:/victoria-metrics-data

  loki:
    image: grafana/loki:3.0.0
    volumes:
      - loki_data:/loki

  grafana:
    image: grafana/grafana:10.4.0
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana

volumes:
  redis_data:
  tsdb_data:
  vm_data:
  loki_data:
  grafana_data:
