# Dev environment — uses .env file, no HA, metrics exposed locally
# Usage: docker compose up

x-common-env: &common-env
  ENVIRONMENT: dev
  SECRET_MANAGER: env
  LOG_LEVEL: INFO
  MTLS_CA_CERT: /app/certs/ca.crt
  MTLS_CERT_DIR: /app/certs/mtls
  REDIS_HOST: redis
  REDIS_PORT: 6379
  REDIS_TLS: "true"
  REDIS_TLS_CA: /app/certs/ca.crt
  REDIS_TLS_CERT: /app/certs/redis/client.crt
  REDIS_TLS_KEY: /app/certs/redis/client.key
  OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
  LOKI_URL: http://loki:3100
  VICTORIAMETRICS_URL: http://victoriametrics:8428

services:

  # ── Infrastructure ─────────────────────────────────────────────────────────────

  redis:
    image: redis:7.2-alpine
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --bind 0.0.0.0
      --tls-port 6379
      --port 0
      --tls-cert-file /tls/redis/redis.crt
      --tls-key-file /tls/redis/redis.key
      --tls-ca-cert-file /tls/ca.crt
      --tls-auth-clients yes
    volumes:
      - ./certs:/tls:ro
      - redis_data:/data
    deploy:
      resources:
        limits:
          cpus: "0.1"
          memory: 128M
    restart: unless-stopped

  timescaledb:
    image: timescale/timescaledb:2.14.2-pg16
    environment:
      POSTGRES_DB: dlp_audit
      POSTGRES_USER: dlp_user
      POSTGRES_PASSWORD: ${TIMESCALEDB_PASSWORD:-changeme}
    volumes:
      - tsdb_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    deploy:
      resources:
        limits:
          cpus: "0.1"
          memory: 128M
    restart: unless-stopped

  jaeger:
    image: jaegertracing/all-in-one:1.57
    ports:
      - "16686:16686"   # UI
      - "4317:4317"     # OTLP gRPC
    restart: unless-stopped

  victoriametrics:
    image: victoriametrics/victoria-metrics:v1.99.0
    command:
      - "--promscrape.config=/etc/vm/scrape.yml"
      - "--storageDataPath=/victoria-metrics-data"
    ports:
      - "8428:8428"
    volumes:
      - vm_data:/victoria-metrics-data
      - ./config/victoriametrics/scrape.yml:/etc/vm/scrape.yml:ro
    depends_on:
      - orchestrator
    restart: unless-stopped

  loki:
    image: grafana/loki:3.0.0
    ports:
      - "3100:3100"
    volumes:
      - loki_data:/loki
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.4.0
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - loki
      - victoriametrics
      - jaeger
    restart: unless-stopped

  # ── DLP Services ───────────────────────────────────────────────────────────────

  orchestrator:
    build:
      context: .
      dockerfile: dockerfiles/orchestrator.Dockerfile
    env_file: .env
    environment:
      <<: *common-env
      ORCHESTRATOR_HOST: 0.0.0.0
      ORCHESTRATOR_PORT: "8443"
      ORCHESTRATOR_WORKERS: "1"
      DATABASE_URL: postgresql+asyncpg://dlp_user:${TIMESCALEDB_PASSWORD:-changeme}@timescaledb:5432/dlp_audit
    volumes:
      - ./certs:/app/certs:ro
      - ./config:/app/config:ro
    ports:
      - "8443:8443"
      - "9090:9090"   # metrics
    depends_on:
      - redis
      - timescaledb
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 3G
    restart: unless-stopped

  proxy:
    build:
      context: .
      dockerfile: dockerfiles/proxy.Dockerfile
    env_file: .env
    environment:
      <<: *common-env
      ORCHESTRATOR_URL: https://orchestrator:8443
      PROXY_LISTEN_HOST: 0.0.0.0
      PROXY_LISTEN_PORT: "8888"
    volumes:
      - ./certs:/app/certs:ro
      - ./config:/app/config:ro
    ports:
      - "8888:8888"
    depends_on:
      - orchestrator
    deploy:
      resources:
        limits:
          cpus: "0.2"
          memory: 256M
    restart: unless-stopped

  domain_updater:
    build:
      context: .
      dockerfile: dockerfiles/domain_updater.Dockerfile
    env_file: .env
    environment:
      <<: *common-env
    volumes:
      - ./certs:/app/certs:ro
      - ./config:/app/config      # rw — updater writes whitelist
    depends_on:
      - orchestrator
    restart: unless-stopped

  dashboard_api:
    build:
      context: .
      dockerfile: dockerfiles/dashboard_api.Dockerfile
    env_file: .env
    environment:
      <<: *common-env
      DASHBOARD_HOST: 0.0.0.0
      DASHBOARD_PORT: "9443"
      DATABASE_URL: postgresql+asyncpg://dlp_user:${TIMESCALEDB_PASSWORD:-changeme}@timescaledb:5432/dlp_audit
    volumes:
      - ./certs:/app/certs:ro
      - ./config:/app/config:ro
    ports:
      - "9443:9443"
    depends_on:
      - timescaledb
    deploy:
      resources:
        limits:
          cpus: "0.1"
          memory: 256M
    restart: unless-stopped

  dashboard_ui:
    build:
      context: ./src/dashboard/ui
      dockerfile: Dockerfile
    ports:
      - "3001:80"
    depends_on:
      - dashboard_api
    restart: unless-stopped

volumes:
  redis_data:
  tsdb_data:
  vm_data:
  loki_data:
  grafana_data:
