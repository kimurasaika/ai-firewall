# Production — Vault secrets, full HA (2 proxy nodes), resource limits
# Usage: docker compose -f docker-compose.production.yml up -d
# NOTE: Vault must be unsealed and reachable before starting services

x-common-env: &common-env
  ENVIRONMENT: production
  SECRET_MANAGER: vault
  LOG_LEVEL: WARNING
  MTLS_CA_CERT: /app/certs/ca.crt
  MTLS_CERT_DIR: /app/certs/mtls

x-resource-defaults: &resource-defaults
  deploy:
    restart_policy:
      condition: on-failure
      max_attempts: 3
    resources:
      limits:
        cpus: "2"
        memory: 2g

services:

  vault:
    image: hashicorp/vault:1.16
    cap_add:
      - IPC_LOCK
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: ""    # not dev mode in production
    volumes:
      - vault_data:/vault/data
      - ./config/vault.hcl:/vault/config/vault.hcl:ro
      - ./certs:/vault/certs:ro
    ports:
      - "8200:8200"
    restart: unless-stopped

  haproxy:
    image: haproxy:2.8-alpine
    volumes:
      - ./config/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
      - ./certs:/certs:ro
    ports:
      - "8888:8888"
      - "8404:8404"
    depends_on:
      - proxy_1
      - proxy_2
    restart: unless-stopped

  proxy_1:
    build:
      context: .
      dockerfile: dockerfiles/proxy.Dockerfile
    environment:
      <<: *common-env
      VAULT_ADDR: http://vault:8200
      INSTANCE_ID: proxy_1
    volumes:
      - ./certs:/app/certs:ro
      - ./config:/app/config:ro
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    <<: *resource-defaults
    restart: unless-stopped

  proxy_2:
    build:
      context: .
      dockerfile: dockerfiles/proxy.Dockerfile
    environment:
      <<: *common-env
      VAULT_ADDR: http://vault:8200
      INSTANCE_ID: proxy_2
    volumes:
      - ./certs:/app/certs:ro
      - ./config:/app/config:ro
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    <<: *resource-defaults
    restart: unless-stopped

  orchestrator:
    build:
      context: .
      dockerfile: dockerfiles/orchestrator.Dockerfile
    environment:
      <<: *common-env
      VAULT_ADDR: http://vault:8200
      ORCHESTRATOR_WORKERS: "4"
    volumes:
      - ./certs:/app/certs:ro
      - ./config:/app/config:ro
    security_opt:
      - no-new-privileges:true
    <<: *resource-defaults
    restart: unless-stopped

  redis:
    image: redis:7.2-alpine
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --bind 127.0.0.1
      --tls-port 6379
      --port 0
      --tls-cert-file /tls/redis.crt
      --tls-key-file /tls/redis.key
      --tls-ca-cert-file /tls/ca.crt
      --tls-auth-clients yes
      --save 60 1000
      --appendonly yes
    network_mode: host
    volumes:
      - ./certs:/tls:ro
      - redis_data:/data
    deploy:
      resources:
        limits:
          memory: 1g
    restart: unless-stopped

  timescaledb:
    image: timescale/timescaledb:2.14.2-pg16
    environment:
      POSTGRES_DB: dlp_audit
      POSTGRES_USER: dlp_user
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
    volumes:
      - tsdb_data:/var/lib/postgresql/data
    secrets:
      - db_password
    deploy:
      resources:
        limits:
          memory: 4g
    restart: unless-stopped

  domain_updater:
    build:
      context: .
      dockerfile: dockerfiles/domain_updater.Dockerfile
    environment:
      <<: *common-env
      VAULT_ADDR: http://vault:8200
    volumes:
      - ./certs:/app/certs:ro
      - ./config:/app/config    # rw
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

  dashboard_api:
    build:
      context: .
      dockerfile: dockerfiles/dashboard_api.Dockerfile
    environment:
      <<: *common-env
      VAULT_ADDR: http://vault:8200
    volumes:
      - ./certs:/app/certs:ro
      - ./config:/app/config:ro
    security_opt:
      - no-new-privileges:true
    <<: *resource-defaults
    restart: unless-stopped

  # ── Observability stack ────────────────────────────────────────────────────────

  jaeger:
    image: jaegertracing/all-in-one:1.57
    ports:
      - "16686:16686"
      - "4317:4317"
    restart: unless-stopped

  victoriametrics:
    image: victoriametrics/victoria-metrics:v1.99.0
    volumes:
      - vm_data:/victoria-metrics-data
    ports:
      - "8428:8428"
    restart: unless-stopped

  loki:
    image: grafana/loki:3.0.0
    volumes:
      - loki_data:/loki
    ports:
      - "3100:3100"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.4.0
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - loki
      - victoriametrics
      - jaeger
    restart: unless-stopped

secrets:
  db_password:
    external: true

volumes:
  vault_data:
  redis_data:
  tsdb_data:
  vm_data:
  loki_data:
  grafana_data:
