# PII detection configuration — ML/Dev only
# Presidio entity types + Thai NER custom entities

language: th    # primary; also detect en automatically

entities:
  - name: PERSON
    token_prefix: "P"
    token_format: "<<P{:03d}>>"
    score_threshold: 0.7

  - name: PHONE_NUMBER
    token_prefix: "PH"
    token_format: "<<PH{:03d}>>"
    score_threshold: 0.6
    patterns:
      # Thai mobile numbers: 08x, 09x, 06x; also landline 02x
      - name: thai_mobile
        regex: "(?:0[689]\\d{8}|0[2-7]\\d{7,8})"
        score: 0.85
      - name: intl_thai
        regex: "\\+66\\s?\\d{1,2}[-\\s]?\\d{3,4}[-\\s]?\\d{4}"
        score: 0.9

  - name: EMAIL_ADDRESS
    token_prefix: "EM"
    token_format: "<<EM{:03d}>>"
    score_threshold: 0.8

  - name: TH_NATIONAL_ID
    token_prefix: "ID"
    token_format: "<<ID{:03d}>>"
    score_threshold: 0.9
    patterns:
      - name: thai_id_card
        regex: "\\b[1-9]\\d{12}\\b"
        score: 0.95
      - name: thai_id_formatted
        regex: "\\b[1-9]-\\d{4}-\\d{5}-\\d{2}-\\d\\b"
        score: 0.99

  - name: LOCATION
    token_prefix: "AD"
    token_format: "<<AD{:03d}>>"
    score_threshold: 0.65

  - name: ORGANIZATION
    token_prefix: "ORG"
    token_format: "<<ORG{:03d}>>"
    score_threshold: 0.65

custom_recognizers:
  - name: ThaiNERRecognizer
    module: src.workers.text_worker
    class: ThaiNERRecognizer
    supported_entities:
      - PERSON
      - LOCATION
      - ORGANIZATION

deny_list_recognizers: []

context_words:
  PHONE_NUMBER:
    - "โทร"
    - "เบอร์"
    - "ติดต่อ"
    - "tel"
    - "mobile"
    - "phone"
  TH_NATIONAL_ID:
    - "บัตรประชาชน"
    - "เลขที่บัตร"
    - "national id"
    - "citizen id"
  LOCATION:
    - "ที่อยู่"
    - "address"
    - "อาศัยอยู่"
    - "จังหวัด"
    - "ถนน"
    - "ซอย"

anonymizer:
  operator: replace       # replace with token
  lambda_value: null      # unused; tokens generated by counter
