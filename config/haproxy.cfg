global
    log stdout format raw local0
    maxconn 4096
    ssl-default-bind-ciphers TLS_AES_256_GCM_SHA384:TLS_CHACHA20_POLY1305_SHA256
    ssl-default-bind-options ssl-min-ver TLSv1.2

defaults
    log     global
    mode    tcp
    option  tcplog
    option  dontlognull
    timeout connect 5s
    timeout client  60s
    timeout server  60s
    retries 3

# ── Proxy load balancer ──────────────────────────────────────────────────────────
frontend proxy_frontend
    bind *:8888
    default_backend proxy_backends

backend proxy_backends
    balance roundrobin
    option tcp-check
    server proxy_1 proxy_1:8888 check inter 5s fall 2 rise 3
    server proxy_2 proxy_2:8888 check inter 5s fall 2 rise 3

# ── Stats page ───────────────────────────────────────────────────────────────────
frontend stats
    bind *:8404
    mode http
    stats enable
    stats uri /stats
    stats refresh 10s
    stats auth admin:${HAPROXY_STATS_PASSWORD}
    stats hide-version
